apiVersion: v1
kind: Service
metadata:
  name: {{ include "name-resolution.fullname" . }}
  labels:
    {{- include "name-resolution.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.containers.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "name-resolution.selectorLabels" . | nindent 4 }}
